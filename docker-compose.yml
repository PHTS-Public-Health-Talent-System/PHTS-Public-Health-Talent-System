services:

  mysql:
    image: mysql:8.4
    container_name: phts-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: phts_system
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - phts_mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: phts-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - phts_redis_data:/data

volumes:
  phts_mysql_data:
  phts_redis_data:
