version: "3.9"

services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-b7850
    command:
      - "--model"
      - "/models/typhoon-ocr1.5-2b.Q4_K_M.gguf"
      - "--mmproj"
      - "/models/typhoon-ocr1.5-2b.mmproj-Q8_0.gguf"
      - "--ctx-size"
      - "4096"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    volumes:
      - ./ocr-models/typhoon-ocr1.5-2b:/models:ro
    ports:
      - "11435:8080"

  ocr-typhoon:
    build:
      context: ./ocr-typhoon
    environment:
      MODEL_SERVER_MODE: "auto"
      CLOUD_BASE_URL: "https://api.opentyphoon.ai/v1"
      CLOUD_API_KEY: "${TYPHOON_OCR_API_KEY}"
      CLOUD_MODEL: "typhoon-ocr"
      LOCAL_BASE_URL: "http://llama-cpp:8080/v1"
      LOCAL_API_KEY: "llama"
      LOCAL_MODEL: "typhoon-ocr1.5-2b.Q4_K_M.gguf"
      TYPHOON_OCR_TASK_TYPE: "v1.5"
      TYPHOON_OCR_FIGURE_LANGUAGE: "Thai"
      MODEL_SERVER_TIMEOUT_S: "900"
    ports:
      - "8012:8000"
    depends_on:
      - llama-cpp

volumes: {}
